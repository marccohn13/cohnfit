<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CohnFit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent2: #47d4ff;
    --accent3: #ff6b47;
    --text: #f0f0f0;
    --muted: #888;
    --bike: #47d4ff;
    --cals: #c47aff;
    --walk: #ff9547;
    --rest: #444;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 0 0 60px;
  }
  #root { width: 100%; max-width: 480px; padding: 0 16px; }

  /* Login screen */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 32px;
    text-align: center;
  }
  .logo-lockup { display: flex; flex-direction: column; gap: 8px; }
  .logo-text { font-size: 42px; font-weight: 600; letter-spacing: -1px; }
  .logo-text span { color: var(--accent); }
  .logo-sub { font-size: 14px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .strava-btn {
    display: flex; align-items: center; gap: 12px;
    background: #fc4c02; color: white;
    border: none; border-radius: var(--radius);
    padding: 14px 28px; font-size: 16px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }
  .strava-btn:hover { opacity: 0.88; }
  .strava-btn svg { width: 22px; height: 22px; fill: white; }

  /* App shell */
  #app-screen { display: none; }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 16px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .top-logo { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .top-logo span { color: var(--accent); }
  .top-right { display: flex; align-items: center; gap: 10px; }
  .streak-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 12px;
    font-size: 13px; font-weight: 500;
  }
  .streak-chip .flame { font-size: 15px; }
  .sync-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 10px;
    color: var(--muted); font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sync-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

  /* Stats row */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-val { font-size: 26px; font-weight: 600; line-height: 1; font-family: 'DM Mono', monospace; }
  .stat-unit { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 3px; font-family: 'DM Sans', sans-serif; }

  /* Week nav */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .week-label { font-size: 14px; font-weight: 500; color: var(--muted); }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); font-size: 14px;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Day cards */
  .days-list { display: flex; flex-direction: column; gap: 8px; }
  .day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color 0.2s;
  }
  .day-card.is-today { border-color: var(--accent); }
  .day-card.is-past { opacity: 0.75; }
  .day-card.is-rest { opacity: 0.45; }

  .activity-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .icon-bike { background: rgba(71,212,255,0.12); }
  .icon-cals { background: rgba(196,122,255,0.12); }
  .icon-walk { background: rgba(255,149,71,0.12); }
  .icon-rest { background: rgba(100,100,100,0.1); }

  .day-meta { flex: 1; min-width: 0; }
  .day-name { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .day-name.today-label { color: var(--accent); }
  .day-activity { font-size: 16px; font-weight: 500; }
  .day-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .day-right { text-align: right; flex-shrink: 0; }
  .done-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(232,255,71,0.15); border: 1px solid var(--accent);
    font-size: 12px; margin-bottom: 4px;
  }
  .done-kcal { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .planned-pill {
    font-size: 11px; background: var(--surface2);
    color: var(--muted); border-radius: 20px; padding: 3px 9px;
    border: 1px solid var(--border);
  }
  .today-pill {
    font-size: 11px; background: rgba(232,255,71,0.1);
    color: var(--accent); border-radius: 20px; padding: 3px 9px;
    border: 1px solid rgba(232,255,71,0.3);
  }

  /* Loading / error */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .error-msg { background: rgba(255,107,71,0.1); border: 1px solid rgba(255,107,71,0.3); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--accent3); margin-bottom: 16px; }

  /* Spinning sync icon */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.8s linear infinite; display: inline-block; }

  /* Activity colors */
  .c-bike { color: var(--bike); }
  .c-cals { color: var(--cals); }
  .c-walk { color: var(--walk); }
  .c-rest { color: var(--rest); }
</style>
</head>
<body>
<div id="root">

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="logo-lockup">
      <div class="logo-text">Cohn<span>Fit</span></div>
      <div class="logo-sub">Your personal fitness tracker</div>
    </div>
    <button class="strava-btn" onclick="stravaLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/>
      </svg>
      Connect with Strava
    </button>
    <div style="font-size:12px;color:var(--muted);max-width:260px;line-height:1.6;">
      Your workouts sync automatically from Strava after each activity.
    </div>
  </div>

  <!-- APP -->
  <div id="app-screen">
    <div class="top-bar">
      <div class="top-logo">Cohn<span>Fit</span></div>
      <div class="top-right">
        <div class="streak-chip">
          <span class="flame">🔥</span>
          <span id="streak-count">0</span>
          <span style="color:var(--muted);font-size:11px">day streak</span>
        </div>
        <button class="sync-btn" onclick="syncActivities()">
          <svg id="sync-icon" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Sync
        </button>
      </div>
    </div>

    <div id="error-area"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Week calories</div>
        <div class="stat-val" id="stat-calories">—<span class="stat-unit">kcal</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Streak</div>
        <div class="stat-val" id="stat-streak">—<span class="stat-unit">days</span></div>
      </div>
    </div>

    <div class="week-nav">
      <div class="week-label" id="week-label">Loading…</div>
      <div class="nav-btns">
        <div class="nav-btn" onclick="changeWeek(-1)">‹</div>
        <div class="nav-btn" onclick="changeWeek(1)">›</div>
      </div>
    </div>

    <div class="days-list" id="days-list">
      <div class="loading">Loading your plan…</div>
    </div>
  </div>

</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CLIENT_ID     = 'PASTE_YOUR_CLIENT_ID_HERE';
const REDIRECT_URI  = window.location.origin + window.location.pathname;

// Rotation: today (May 18 2026) = Walk, then Bike, Cals, Walk, Bike, Cals…
// Anchor date: May 18 2026 = index 2 (Walk)
const ANCHOR_DATE   = new Date('2026-05-18T00:00:00');
const ANCHOR_INDEX  = 2; // 0=Bike, 1=Cals, 2=Walk

const ACTIVITIES = [
  { key:'bike', label:'Cycling',      icon:'🚴', iconClass:'icon-bike', colorClass:'c-bike', target:'45–60 min · ~12 mi',    stravaTypes:['Ride','VirtualRide','EBikeRide'] },
  { key:'cals', label:'Calisthenics', icon:'💪', iconClass:'icon-cals', colorClass:'c-cals', target:'30–45 min',              stravaTypes:['WeightTraining','Workout','Crossfit','Elliptical'] },
  { key:'walk', label:'Walking',      icon:'🚶', iconClass:'icon-walk', colorClass:'c-walk', target:'45–60 min · ~3 mi',      stravaTypes:['Walk','Hike'] },
];

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─── STATE ─────────────────────────────────────────────────────────────────
let accessToken = null;
let activities  = [];  // raw Strava activities
let weekOffset  = 0;   // 0 = current week

// ─── UTILS ─────────────────────────────────────────────────────────────────
function toDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getActivityForDate(date) {
  const msPerDay = 86400000;
  const anchorMs = new Date(ANCHOR_DATE).setHours(0,0,0,0);
  const dateMs   = new Date(date).setHours(0,0,0,0);
  const diff = Math.round((dateMs - anchorMs) / msPerDay);
  let idx = ((ANCHOR_INDEX + diff) % 3 + 3) % 3;
  return ACTIVITIES[idx];
}

function getMondayOfWeek(offset) {
  const today = new Date();
  const day = today.getDay(); // 0=Sun
  const diffToMonday = (day === 0) ? -6 : 1 - day;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diffToMonday + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function getWeekDays(offset) {
  const monday = getMondayOfWeek(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function formatDate(d) {
  return MONTH_NAMES[d.getMonth()] + ' ' + d.getDate();
}

function metersToMiles(m) { return (m / 1609.344).toFixed(1); }
function secToMin(s) { return Math.round(s / 60); }

// ─── STRAVA OAUTH ──────────────────────────────────────────────────────────
function stravaLogin() {
  const scope = 'read,activity:read_all';
  const url = `https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&approval_prompt=auto&scope=${scope}`;
  window.location.href = url;
}

async function exchangeCode(code) {
  const res = await fetch('/api/strava-token', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code})
  });
  if (!res.ok) throw new Error('Token exchange failed');
  return res.json();
}

async function refreshToken(refresh) {
  const res = await fetch('/api/strava-token', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({refresh_token: refresh})
  });
  if (!res.ok) throw new Error('Token refresh failed');
  return res.json();
}

// ─── STRAVA API ────────────────────────────────────────────────────────────
async function fetchActivities(token, page=1, perPage=100) {
  // fetch last 90 days
  const after = Math.floor(Date.now()/1000) - 90*86400;
  const url = `https://www.strava.com/api/v3/athlete/activities?after=${after}&per_page=${perPage}&page=${page}`;
  const res = await fetch(url, {headers:{Authorization:`Bearer ${token}`}});
  if (!res.ok) throw new Error('Failed to fetch activities');
  return res.json();
}

// ─── SYNC ──────────────────────────────────────────────────────────────────
async function syncActivities() {
  const icon = document.getElementById('sync-icon');
  icon.classList.add('spinning');
  showError('');
  try {
    let token = accessToken;
    const stored = JSON.parse(localStorage.getItem('cf_token') || '{}');
    if (stored.expires_at && Date.now()/1000 > stored.expires_at - 300) {
      const refreshed = await refreshToken(stored.refresh_token);
      stored.access_token = refreshed.access_token;
      stored.expires_at   = refreshed.expires_at;
      localStorage.setItem('cf_token', JSON.stringify(stored));
      token = refreshed.access_token;
      accessToken = token;
    }
    activities = await fetchActivities(token);
    localStorage.setItem('cf_activities', JSON.stringify(activities));
    renderWeek();
    renderStats();
  } catch(e) {
    showError('Sync failed: ' + e.message);
  } finally {
    icon.classList.remove('spinning');
  }
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function findStravaActivity(date, activityDef) {
  const dateStr = toDateStr(date);
  return activities.find(a => {
    const aDate = toDateStr(new Date(a.start_date_local));
    return aDate === dateStr && activityDef.stravaTypes.includes(a.type);
  });
}

function renderWeek() {
  const days = getWeekDays(weekOffset);
  const todayStr = toDateStr(new Date());
  const monday = days[0];
  const sunday = days[6];

  document.getElementById('week-label').textContent =
    formatDate(monday) + ' – ' + formatDate(sunday);

  const list = document.getElementById('days-list');
  list.innerHTML = '';

  days.forEach((date, i) => {
    const dateStr = toDateStr(date);
    const isToday = dateStr === todayStr;
    const isPast  = date < new Date(new Date().setHours(0,0,0,0));

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' is-today' : '') + (isPast && !isToday ? ' is-past' : '');

    const actDef   = getActivityForDate(date);
    const stravaAct = findStravaActivity(date, actDef);

    let rightHtml = '';
    let detailText = '';

    if (stravaAct) {
      const kcal = extractKcal(stravaAct);
      const mins = secToMin(stravaAct.moving_time);
      const dist = stravaAct.distance > 100 ? metersToMiles(stravaAct.distance) + ' mi' : '';
      const elev = stravaAct.total_elevation_gain > 5 ? ' · ' + Math.round(stravaAct.total_elevation_gain * 3.281) + 'ft elev' : '';
      detailText = [dist, mins + ' min' + elev].filter(Boolean).join(' · ');
      const kcalDisplay = kcal > 0 ? kcal + ' kcal' : '— kcal';
      rightHtml = `<div class="done-badge">✓</div><div class="done-kcal">${kcalDisplay}</div>`;
    } else if (isPast && !isToday) {
      detailText = 'No activity logged';
      rightHtml = `<span class="planned-pill" style="color:var(--accent3);border-color:rgba(255,107,71,0.3)">Missed</span>`;
    } else if (isToday) {
      detailText = 'Target: ' + actDef.target;
      rightHtml = `<span class="today-pill">Today</span>`;
    } else {
      detailText = 'Target: ' + actDef.target;
      rightHtml = `<span class="planned-pill">Planned</span>`;
    }

    card.innerHTML = `
      <div class="activity-icon ${actDef.iconClass}">${actDef.icon}</div>
      <div class="day-meta">
        <div class="day-name ${isToday?'today-label':''}">${DAY_NAMES[date.getDay()]} ${date.getDate()}</div>
        <div class="day-activity ${actDef.colorClass}">${actDef.label}</div>
        <div class="day-detail">${detailText}</div>
      </div>
      <div class="day-right">${rightHtml}</div>`;

    list.appendChild(card);
  });
}

// MET-based calorie estimate fallback (assumes 180lb / 82kg user)
const MET = { bike: 7.5, cals: 5.0, walk: 3.5 };
function extractKcal(act) {
  if (act.calories && act.calories > 0) return Math.round(act.calories);
  if (act.kilojoules && act.kilojoules > 0) return Math.round(act.kilojoules * 0.239);
  // Fallback: estimate from duration using MET
  const mins = (act.moving_time || 0) / 60;
  const type = act.type || '';
  let met = 4.0;
  if (['Ride','VirtualRide','EBikeRide'].includes(type)) met = MET.bike;
  else if (['Walk','Hike'].includes(type)) met = MET.walk;
  else met = MET.cals;
  return Math.round(met * 82 * (mins / 60));
}

function renderStats() {
  const days = getWeekDays(weekOffset);
  const todayStr = toDateStr(new Date());

  // Weekly calories — sum all completed days this week
  let weekCals = 0;
  let hasAny = false;
  days.forEach(date => {
    const actDef = getActivityForDate(date);
    const act = findStravaActivity(date, actDef);
    if (act) {
      weekCals += extractKcal(act);
      hasAny = true;
    }
  });
  document.getElementById('stat-calories').innerHTML =
    hasAny ? weekCals.toLocaleString() + '<span class="stat-unit">kcal</span>' : '—<span class="stat-unit">kcal</span>';

  // Streak: count consecutive days from ANCHOR_DATE (May 18 2026) up to today
  // Only counts days on/after the anchor; Sundays included; today counts if done
  const today = new Date(); today.setHours(0,0,0,0);
  const anchor = new Date(ANCHOR_DATE); anchor.setHours(0,0,0,0);
  let streak = 0;
  let check = new Date(today);
  for (let i = 0; i < 365; i++) {
    if (check < anchor) break; // don't count before CohnFit started
    const actDef = getActivityForDate(check);
    const act = findStravaActivity(check, actDef);
    const isToday = toDateStr(check) === todayStr;
    if (act) {
      streak++;
      check.setDate(check.getDate()-1);
    } else if (isToday) {
      // Today not yet done — don't break streak, just skip
      check.setDate(check.getDate()-1);
    } else {
      break;
    }
  }
  document.getElementById('stat-streak').innerHTML = streak + '<span class="stat-unit">days</span>';
  document.getElementById('streak-count').textContent = streak;
}

function changeWeek(dir) {
  weekOffset += dir;
  renderWeek();
  renderStats();
}

function showError(msg) {
  const el = document.getElementById('error-area');
  el.innerHTML = msg ? `<div class="error-msg">${msg}</div>` : '';
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');

  // Clear URL params
  if (code) window.history.replaceState({}, '', window.location.pathname);

  // Try to load saved token
  let stored = JSON.parse(localStorage.getItem('cf_token') || '{}');

  if (code && !stored.access_token) {
    // Exchange auth code for token
    try {
      const tokenData = await exchangeCode(code);
      stored = tokenData;
      localStorage.setItem('cf_token', JSON.stringify(stored));
    } catch(e) {
      showError('Could not connect to Strava: ' + e.message);
      return;
    }
  }

  if (!stored.access_token) {
    // Not logged in — show login screen
    document.getElementById('login-screen').style.display = 'flex';
    return;
  }

  // Refresh token if needed
  if (stored.expires_at && Date.now()/1000 > stored.expires_at - 300) {
    try {
      const refreshed = await refreshToken(stored.refresh_token);
      stored.access_token = refreshed.access_token;
      stored.expires_at   = refreshed.expires_at;
      localStorage.setItem('cf_token', JSON.stringify(stored));
    } catch(e) { /* use existing token */ }
  }

  accessToken = stored.access_token;

  // Load cached activities
  const cached = localStorage.getItem('cf_activities');
  if (cached) activities = JSON.parse(cached);

  // Show app
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'block';

  renderWeek();
  renderStats();

  // Auto-sync in background
  syncActivities();
}

init();
</script>
</body>
</html>
